set_cover_option:
  name: Set cover option
  description: >-
    Programmatically update a per-cover setting. Prefer the integration options
    flow (Configure → pick a shutter) for normal editing. Also used by the
    Lovelace table card.
  fields:
    cover_id:
      name: Cover entity id
      description: The cover entity id to update.
      required: true
      example: cover.living_room
      selector:
        entity:
          domain: cover
    key:
      name: Setting key
      description: >-
        The setting to change (e.g. direction, eave_length, desired_temp,
        action_delay_hours, max_moves_per_day, enabled, close_evening,
        open_morning, close_rain).
      required: true
      example: desired_temp
      selector:
        text:
    value:
      name: Value
      description: The new value for the setting.
      required: true
      example: "23"
      selector:
        text:

set_test_override:
  name: Set test override
  description: >-
    Update a manual test input while test mode is active. Omit cover_id for
    hub-level overrides (season, is_day, sun angles, etc.).
  fields:
    cover_id:
      name: Cover entity id
      description: Optional. Per-cover override (e.g. test_room_temp).
      required: false
      selector:
        entity:
          domain: cover
    key:
      name: Setting key
      description: Config key to override.
      required: true
      selector:
        text:
    value:
      name: Value
      description: New value.
      required: true
      selector:
        text:

set_virtual_state:
  name: Set virtual shutter state
  description: Manually set the virtual shutter state in test mode.
  fields:
    cover_id:
      name: Cover entity id
      required: true
      selector:
        entity:
          domain: cover
    state:
      name: State
      required: true
      selector:
        select:
          options:
            - open
            - closed
